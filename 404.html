<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Canvas Not Found | Pawtrait Pet Portraits</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/616/616408.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <style>
        body {
            background: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-content {
            max-width: 600px;
            padding: 40px;
        }
        .paint-splatter {
            font-size: 120px;
            color: var(--primary-color);
            position: relative;
            margin-bottom: 40px;
        }
        .error-code {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="error-content">
        <div class="paint-splatter">
            <i class="fas fa-paw"></i>
            <div class="error-code">404</div>
        </div>
        
        <h1 class="display-3 mb-4">Oops! This canvas is blank.</h1>
        <p class="lead text-muted mb-5">The page you're looking for has been misplaced or never existed. Let's get you back to the studio.</p>
        
        <div class="d-flex flex-wrap justify-content-center gap-3 mb-5">
            <a href="index.html" class="btn-pawtrait btn-primary">Back to Home</a>
            <a href="gallery.html" class="btn-pawtrait btn-outline">View Gallery</a>
            <a href="contact.html" class="btn-pawtrait btn-outline">Contact Artist</a>
        </div>

        <div class="input-group max-width-400 mx-auto">
            <input type="text" class="form-control" placeholder="Search the site...">
            <button class="btn btn-dark"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
</body>
</html>
