<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Elena Vasquez Studio</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/616/616408.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css?v=2">
    <link rel="stylesheet" href="assets/css/dark-mode.css?v=2">
    <link rel="stylesheet" href="assets/css/rtl.css?v=2">

    <style>
        body {
            background: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        .paint-drip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: var(--primary-color);
            clip-path: polygon(0 0, 100% 0, 100% 70%, 90% 90%, 80% 70%, 70% 100%, 60% 80%, 50% 100%, 40% 70%, 30% 90%, 20% 60%, 10% 90%, 0 70%);
            animation: drip 3s ease-in-out infinite alternate;
            z-index: 0;
            opacity: 0.8;
        }
        @keyframes drip {
            from { transform: translateY(-10px); }
            to { transform: translateY(10px); }
        }
        .cs-content {
            position: relative;
            z-index: 1;
            max-width: 700px;
            padding: 40px;
        }
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 50px 0;
        }
        .countdown-item {
            background: white;
            padding: 20px;
            border-radius: 8px;
            min-width: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .countdown-item h2 {
            font-size: 36px;
            margin-bottom: 0;
            color: var(--primary-color);
        }
        .countdown-item span {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="paint-drip"></div>

    <div class="cs-content">
        <a href="index.html" class="logo d-block mb-4 fs-1"><i class="fas fa-paw me-2 text-primary"></i>Pawtrait.</a>
        <h1 class="display-4 mb-3">Something beautiful is in the works.</h1>
        <p class="lead text-muted">We're preparing the studio for our next collection of pet portraits. Stay tuned for our grand re-opening.</p>

        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <h2 id="days">00</h2>
                <span>Days</span>
            </div>
            <div class="countdown-item">
                <h2 id="hours">00</h2>
                <span>Hours</span>
            </div>
            <div class="countdown-item">
                <h2 id="minutes">00</h2>
                <span>Mins</span>
            </div>
            <div class="countdown-item">
                <h2 id="seconds">00</h2>
                <span>Secs</span>
            </div>
        </div>

        <div class="max-width-500 mx-auto mt-5">
            <p class="mb-4 fw-bold">Be the first to know when we launch:</p>
            <form class="input-group">
                <input type="email" class="form-control" placeholder="Enter your email">
                <button class="btn btn-primary px-4">Notify Me</button>
            </form>
        </div>

        <div class="mt-5 d-flex justify-content-center gap-4 fs-4 text-muted">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-pinterest"></i></a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>
</body>
</html>
