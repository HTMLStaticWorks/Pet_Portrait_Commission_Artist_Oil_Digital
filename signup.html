<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Pawtrait Pet Portraits</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/616/616408.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css?v=2">
    <link rel="stylesheet" href="assets/css/dark-mode.css?v=2">
    <link rel="stylesheet" href="assets/css/rtl.css?v=2">
</head>

<body class="dark-theme">

    <div class="auth-container">
        <!-- Toggles -->
        <div class="auth-toggles">
            <button id="theme-toggle" class="toggle-btn" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
            <button id="rtl-toggle" class="toggle-btn" title="Toggle RTL"><i class="fas fa-arrows-left-right"></i></button>
        </div>

        <div class="auth-card">
            <div class="text-center mb-4">
                <a href="index.html" class="logo d-block mb-3"><i class="fas fa-paw me-2 text-primary"></i>Pawtrait.</a>
                <h3 class="fw-bold">Create Account</h3>
                <p class="text-muted">Start your pet portrait journey</p>
            </div>

            <!-- Signup Form -->
            <form action="index.html">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Full Name</label>
                    <input type="text" class="form-control py-2" placeholder="Your full name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" class="form-control py-2" placeholder="your@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" class="form-control py-2" id="password" placeholder="Create password"
                            required>
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Confirm Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" class="form-control py-2" id="confirm_password"
                            placeholder="Confirm your password" required>
                        <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"></i>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label small text-muted" for="terms">
                        I agree to the <a href="#" class="text-primary text-decoration-none">Terms & Conditions</a>
                    </label>
                </div>

                <button type="submit" class="btn-pawtrait btn-primary w-100 mb-4">Create Account</button>

                <div class="auth-divider">OR SIGN UP WITH</div>

                <!-- Social Icons Bottom -->
                <div class="social-icons-bottom">
                    <button type="button" class="social-btn-circle google" title="Sign up with Google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button type="button" class="social-btn-circle facebook" title="Sign up with Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </button>
                    <button type="button" class="social-btn-circle apple" title="Sign up with Apple">
                        <i class="fab fa-apple"></i>
                    </button>
                </div>

                <p class="text-center text-muted small mt-4 mb-0">
                    Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-bold">Sign
                        In</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Password Toggle Script
        function setupToggle(buttonId, inputId) {
            const toggle = document.querySelector(buttonId);
            const input = document.querySelector(inputId);
            if (toggle && input) {
                toggle.addEventListener('click', function () {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('fa-eye-slash');
                });
            }
        }

        setupToggle('#togglePassword', '#password');
        setupToggle('#toggleConfirmPassword', '#confirm_password');
    </script>
</body>

</html>
